name: Build VoiceInk

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build VoiceInk (ad-hoc)
    runs-on: macos-26

    steps:
      # ─────────────────────────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm Xcode + Swift versions
        run: |
          xcodebuild -version
          swift --version

      # ─────────────────────────────────────────────────────────────
      # 2. Prepare whisper.cpp cache key
      # ─────────────────────────────────────────────────────────────
      - name: Get whisper.cpp HEAD commit
        id: whisper_ref
        run: |
          COMMIT=$(git ls-remote https://github.com/ggerganov/whisper.cpp.git HEAD | cut -f1)

          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "whisper_dir=$GITHUB_WORKSPACE/.whisper-src" >> "$GITHUB_OUTPUT"

      # ─────────────────────────────────────────────────────────────
      # 3. Cache whisper.xcframework
      # ─────────────────────────────────────────────────────────────
      - name: Cache whisper.xcframework
        id: cache_whisper
        uses: actions/cache@v4
        with:
          path: ${{ steps.whisper_ref.outputs.whisper_dir }}/build-apple/whisper.xcframework
          key: whisper-xcframework-${{ steps.whisper_ref.outputs.commit }}

      # ─────────────────────────────────────────────────────────────
      # 4. Clone whisper.cpp (cache miss only)
      # ─────────────────────────────────────────────────────────────
      - name: Clone whisper.cpp
        if: steps.cache_whisper.outputs.cache-hit != 'true'
        run: |
          git clone \
            --depth 1 \
            https://github.com/ggerganov/whisper.cpp.git \
            "${{ steps.whisper_ref.outputs.whisper_dir }}"

      # ─────────────────────────────────────────────────────────────
      # 5. Build whisper.xcframework (cache miss only)
      # ─────────────────────────────────────────────────────────────
      - name: Build whisper.xcframework
        if: steps.cache_whisper.outputs.cache-hit != 'true'
        working-directory: ${{ steps.whisper_ref.outputs.whisper_dir }}
        run: |
          chmod +x ./build-xcframework.sh
          ./build-xcframework.sh

      # ─────────────────────────────────────────────────────────────
      # 6. Make framework visible to Xcode
      # ─────────────────────────────────────────────────────────────
      - name: Install whisper.xcframework
        run: |
          mkdir -p "$HOME/VoiceInk-Dependencies/whisper.cpp/build-apple"

          rsync -a \
            "${{ steps.whisper_ref.outputs.whisper_dir }}/build-apple/whisper.xcframework" \
            "$HOME/VoiceInk-Dependencies/whisper.cpp/build-apple/"

      # ─────────────────────────────────────────────────────────────
      # 7. Resolve Swift Package Manager dependencies
      # ─────────────────────────────────────────────────────────────
      - name: Resolve SPM dependencies
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project VoiceInk.xcodeproj \
            -scheme VoiceInk \
            -clonedSourcePackagesDirPath .spm-packages

      # ─────────────────────────────────────────────────────────────
      # 8. Build VoiceInk.app
      # ─────────────────────────────────────────────────────────────
      - name: Build VoiceInk.app
        shell: bash
        run: |
          set -eo pipefail

          WHISPER_FW="${{ steps.whisper_ref.outputs.whisper_dir }}/build-apple/whisper.xcframework"
          ENTITLEMENTS="$(pwd)/VoiceInk/VoiceInk.local.entitlements"

          xcodebuild \
            -project VoiceInk.xcodeproj \
            -scheme VoiceInk \
            -configuration Debug \
            -derivedDataPath .build \
            -xcconfig LocalBuild.xcconfig \
            -clonedSourcePackagesDirPath .spm-packages \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_ENTITLEMENTS="$ENTITLEMENTS" \
            "SWIFT_ACTIVE_COMPILATION_CONDITIONS=\$(inherited) LOCAL_BUILD" \
            FRAMEWORK_SEARCH_PATHS="$WHISPER_FW/.." \
            build \
            | xcpretty --color

      # ─────────────────────────────────────────────────────────────
      # 9. Locate + verify app bundle
      # ─────────────────────────────────────────────────────────────
      - name: Verify build output
        shell: bash
        run: |
          APP=$(find .build/Build/Products/Debug -name "VoiceInk.app" -type d | head -1)

          if [ -z "$APP" ]; then
            echo "ERROR: VoiceInk.app not found"
            find .build/Build/Products -type d -name "*.app" || true
            exit 1
          fi

          echo "Found app bundle:"
          echo "$APP"

          echo
          echo "Bundle contents:"
          find "$APP" -maxdepth 2

      # ─────────────────────────────────────────────────────────────
      # 10. Stage app correctly
      # IMPORTANT:
      # We preserve the actual .app bundle itself.
      # DO NOT copy only Contents/.
      # ─────────────────────────────────────────────────────────────
      - name: Stage VoiceInk.app
        shell: bash
        run: |
          APP=$(find .build/Build/Products/Debug -name "VoiceInk.app" -type d | head -1)

          mkdir -p artifact

          ditto "$APP" "artifact/$(basename "$APP")"

          echo
          echo "Artifact contents:"
          find artifact -maxdepth 3

      # ─────────────────────────────────────────────────────────────
      # 11. Create distributable ZIP
      # This preserves macOS metadata/resource forks properly.
      # ─────────────────────────────────────────────────────────────
      - name: Create distributable ZIP
        shell: bash
        run: |
          cd artifact

          ditto -c -k --sequesterRsrc --keepParent \
            VoiceInk.app \
            VoiceInk.zip

          echo
          echo "Created:"
          ls -lh VoiceInk.zip

      # ─────────────────────────────────────────────────────────────
      # 12. Upload artifact
      # ─────────────────────────────────────────────────────────────
      - name: Upload VoiceInk artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceInk-${{ github.sha }}
          path: artifact/VoiceInk.zip
          retention-days: 14
          if-no-files-found: error
